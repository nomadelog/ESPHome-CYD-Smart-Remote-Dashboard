              - lvgl.page.show: {id: page_horloge, animation: LV_SCREEN_LOAD_ANIM_NONE}

        - obj: {x: 0, y: 35, width: 320, height: 2, bg_color: 0x22364F, border_width: 0}

        # Cadre d'habillage
        - obj:
            x: 10
            y: 48
            width: 300
            height: 180
            bg_color: 0x111622
            border_width: 1
            border_color: 0x22364F

        - label:
            id: lbl_chrono_temps
            text: "00:00:00"
            x: 0
            y: 70
            width: 320
            align: LV_ALIGN_TOP_MID
            text_align: LV_TEXT_ALIGN_CENTER
            text_font: font_geante
            text_color: 0xFFFFFF

        # Bouton Départ / Arrêt
        - button:
            id: btn_chrono_toggle
            x: 25
            y: 165
            width: 120
            height: 40
            bg_color: 0x1B8A5A  # Vert fixe style industriel
            widgets:
              - label:
                  id: lbl_btn_chrono_txt
                  text: "Départ"
                  align: LV_ALIGN_CENTER
                  text_font: font_normal
            on_click:
              - script.execute: bip_discret
              - lambda: |-
                  id(chrono_running) = !id(chrono_running);
                  
                  if (id(chrono_running)) {
                    // ACTION DE DÉPART : On mémorise le point de départ
                    id(chrono_millis_depart) = millis() - id(chrono_millis_total);
                  } else {
                    // ACTION D'ARRÊT : On fige le calcul final exact au centième près
                    id(chrono_millis_total) = millis() - id(chrono_millis_depart);
                  }
              # Met à jour le texte du bouton (Arrêt ou Départ)
              - lvgl.label.update:
                  id: lbl_btn_chrono_txt
                  text: !lambda |-
                    return std::string(id(chrono_running) ? "Arrêt" : "Départ");
              # FORCE la mise à jour finale et ultra-précise sur l'écran au moment du STOP
              - if:
                  condition:
                    lambda: 'return !id(chrono_running);'
                  then:
                    - lvgl.label.update:
                        id: lbl_chrono_temps
                        text: !lambda |-
                          uint32_t total_centi = id(chrono_millis_total) / 10;
                          int mins = total_centi / 6000;
                          int secs = (total_centi % 6000) / 100;
                          int centi = total_centi % 100;
                          char buf[32];
                          snprintf(buf, sizeof(buf), "%02d:%02d:%02d", mins, secs, centi);
                          return std::string(buf);

        # Bouton Effacer
        - button:
            x: 175
            y: 165
            width: 120
            height: 40
            bg_color: 0x555555
            widgets:
              - label: {text: "Effacer", align: LV_ALIGN_CENTER, text_font: font_normal}
            on_click:
              - script.execute: bip_discret
              - lambda: |-
                  id(chrono_running) = false;
                  id(chrono_millis_total) = 0; // Remise à zéro des millisecondes
              - lvgl.label.update:
                  id: lbl_chrono_temps
                  text: "00:00:00"
              - lvgl.label.update:
                  id: lbl_btn_chrono_txt
                  text: "Départ"

