    # Sous-Page Config
    - id: page_config
      bg_color: 0x101010
      widgets:
        # Bouton de retour au Menu
        - button:
            x: 255
            y: 5
            width: 60
            height: 24
            widgets:
              - label:
                  text: "Menu"
                  text_font: font_normal
                  align: LV_ALIGN_CENTER
            on_click:
              - script.execute: bip_discret
              - lvgl.page.show:
                  id: page_menu
                  animation: LV_SCREEN_LOAD_ANIM_NONE

        - label:
            text: "Configuration"
            text_font: font_titre
            text_color: 0x00A8FF
            x: 45
            y: 5
            width: 200
        - label:
            id: lbl_config_veille
            x: 10
            y: 50
            width: 80
            text_font: font_normal
            text_align: LV_TEXT_ALIGN_CENTER
            text: "Veille: --"

        # Bouton Moins (-)
        - button:
            x: 100
            y: 45
            width: 40
            height: 25
            widgets:
              - label:
                  text: "-"
                  align: LV_ALIGN_CENTER
            on_click:
              - script.execute: bip_discret
              - lambda: |-
                  int val = (int)id(sauvegarde_veille).state;
                  if (val > 30) {
                    val -= 30;
                  } else if (val == 30) {
                    val = 0;
                  }
                  // LA BONNE SYNTAXE C++ : On crée un appel, on applique la valeur, et on exécute.
                  id(sauvegarde_veille).make_call().set_value(val).perform();
              - lvgl.label.update:
                  id: lbl_config_veille
                  text: !lambda |-
                    int val = (int)id(sauvegarde_veille).state;
                    if (val == 0) {
                      return std::string("Veille: Off");
                    } else {
                      return str_sprintf("Veille: %ds", val);
                    }

        # Bouton Plus (+)
        - button:
            x: 150
            y: 45
            width: 40
            height: 25
            widgets:
              - label:
                  text: "+"
                  align: LV_ALIGN_CENTER
            on_click:
              - script.execute: bip_discret
              - lambda: |-
                  int val = (int)id(sauvegarde_veille).state;
                  if (val == 0) {
                    val = 30;
                  } else if (val < 300) {
                    val += 30;
                  }
                  // LA BONNE SYNTAXE C++ : On crée un appel, on applique la valeur, et on exécute.
                  id(sauvegarde_veille).make_call().set_value(val).perform();
              - lvgl.label.update:
                  id: lbl_config_veille
                  text: !lambda |-
                    int val = (int)id(sauvegarde_veille).state;
                    if (val == 0) {
                      return std::string("Veille: Off");
                    } else {
                      return str_sprintf("Veille: %ds", val);
                    }

        # Bouton Reboot
        - button:
            x: 200
            y: 45
            width: 110
            height: 25
            widgets:
              - label:
                  text: "Redémarrage"
                  text_font: font_normal
                  align: LV_ALIGN_CENTER
            on_click:
              - script.execute: bip_discret
              - button.press: reboot_du_cyd

        # Bouton Tester Haut-Parleur
        - button:
            x: 10
            y: 90
            width: 180
            height: 35
            widgets:
              - label:
                  text: "Tester le Haut-Parleur"
                  text_font: font_normal
                  align: LV_ALIGN_CENTER
            on_click:
              - rtttl.play: "bip:d=8,o=5,b=120:c,e"

        # Bouton d'activation du Son (ON/OFF)
        - button:
            id: btn_toggle_son
            x: 210
            y: 90
            width: 100
            height: 35
            # Le bouton s'affiche Vert ou Rouge au démarrage selon la mémoire
            bg_color: !lambda |-
              return id(son_actif) ? lv_color_hex(0x1B8A5A) : lv_color_hex(0xC0392B);
            widgets:
              - label:
                  id: lbl_son_status
                  text: !lambda |-
                    return id(son_actif) ? std::string("Son: ON") : std::string("Son: OFF");
                  align: LV_ALIGN_CENTER
                  text_font: font_normal
            
            on_click:
              # On inverse la variable globale
              - lambda: 'id(son_actif) = !id(son_actif);'
              
              # On met à jour le texte et la couleur du bouton en temps réel
              - lvgl.label.update:
                  id: lbl_son_status
                  text: !lambda |-
                    return id(son_actif) ? std::string("Bips : ON") : std::string("Bips : MUET");
              - lvgl.widget.update:
                  id: btn_toggle_son
                  bg_color: !lambda |-
                    return id(son_actif) ? lv_color_hex(0x1B8A5A) : lv_color_hex(0xC0392B);
              
              # On ne joue le bip de confirmation QUE si on vient de réactiver le son !
              - script.execute: bip_discret

        # DEL "Bleu"
        - button:
            x: 10
            y: 140
            width: 60
            height: 30
            bg_color: 0x0000FF
            widgets:
              - label: { text: "Bleu", align: LV_ALIGN_CENTER }
            on_click:
              - script.execute: bip_discret
              - globals.set: { id: couleur_del_pref, value: '1' }
              - light.turn_on:
                  id: led_alerte
                  red: 0%
                  green: 0%
                  blue: 100%

        # DEL "Verte"
