            text: "Crosby & Nash"
            x: 10
            y: 100
            width: 300
            align: LV_ALIGN_TOP_MID
            text_align: LV_TEXT_ALIGN_CENTER
            text_font: font_titre
            text_color: 0x888888

        # Ligne de séparation déco du bas
        - obj:
            x: 11
            y: 170
            width: 309
            height: 2
            bg_color: 0x22364F
            border_width: 0

        # --- CONTROLES : BOUTONS MÉDIA ---
        # Slider Volume
        - slider:
            id: volume_slider
            x: 40
            y: 150
            width: 240
            height: 10
            min_value: 0
            max_value: 100
            bg_color: 2242127
            value: !lambda "return id(volume_distant);"
            on_value:
              then:
                - if:
                    condition:
                      lambda: "return !id(blocage_initial);"
                    then:
                      - homeassistant.service:
                          service: media_player.volume_set
                          data:
                            entity_id: media_player.salle_de_sejour_2
                            volume_level: !lambda "return to_string(((int)x) / 100.0);"

        # Bouton : SHUFFLE (Aléatoire)
        - button:
            x: 11
            y: 180
            width: 50
            height: 40
            bg_color: 0x22364F
            widgets:
              - label:
                  text: "Rnd"
                  align: LV_ALIGN_CENTER
                  text_font: font_normal
            on_click:
              - script.execute: bip_discret
              - homeassistant.service:
                  service: media_player.shuffle_set
                  data:
                    entity_id: media_player.salle_de_sejour_2
                    shuffle: "true" # Active le mode aléatoire sur la file Music Assistant

        # Bouton Précédent
        - button:
            x: 73
            y: 180
            width: 50
            height: 40
            bg_color: 0x22364F
            widgets:
              - label:
                  text: "|<"
                  align: LV_ALIGN_CENTER
                  text_font: font_normal
            on_click:
              - script.execute: bip_discret
              - homeassistant.service:
                  service: media_player.media_previous_track
                  data:
                    entity_id: media_player.salle_de_sejour_2

        # Bouton Play/Pause
        - button:
            x: 135
            y: 180
            width: 50
            height: 40
            bg_color: 0x22364F
            widgets:
              - label:
                  text: "||"
                  align: LV_ALIGN_CENTER
                  text_font: font_normal
            on_click:
              - script.execute: bip_discret
              - homeassistant.service:
                  service: media_player.media_play_pause
                  data:
                    entity_id: media_player.salle_de_sejour_2

        # Bouton Suivant
        - button:
            x: 197
            y: 180
            width: 50
            height: 40
            bg_color: 0x22364F
            widgets:
              - label:
                  text: ">|"
                  align: LV_ALIGN_CENTER
                  text_font: font_normal
            on_click:
              - script.execute: bip_discret
              - homeassistant.service:
                  service: media_player.media_next_track
                  data:
                    entity_id: media_player.salle_de_sejour_2

        # Bouton : REPEAT (Répétition)
        - button:
            x: 259
            y: 180
            width: 50
            height: 40
            bg_color: 0x22364F
            widgets:
              - label:
                  text: "Rép"
                  align: LV_ALIGN_CENTER
                  text_font: font_normal
            on_click:
              - script.execute: bip_discret
              - homeassistant.service:
                  service: media_player.repeat_set
                  data:
