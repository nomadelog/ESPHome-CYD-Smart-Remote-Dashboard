---
esphome:
  name: passe-partout
  friendly_name: "Passe-Partout"

  on_boot:
    - priority: -100  # Attend que tout le système (et LVGL) soit bien initialisé
      then:
        # 1. Lance le script de gestion de la veille immédiatement
        - script.execute: gestion_veille
      
        # Allumage selon la préférence sauvegardée :
        - if:
            condition:
              lambda: 'return id(couleur_del_pref) == 1;'
            then:
              - light.turn_on: { id: led_alerte, red: 0%, green: 0%, blue: 100% }
        - if:
            condition:
              lambda: 'return id(couleur_del_pref) == 2;'
            then:
              - light.turn_on: { id: led_alerte, red: 0%, green: 100%, blue: 0% }
        - if:
            condition:
              lambda: 'return id(couleur_del_pref) == 3;'
            then:
              - light.turn_on: { id: led_alerte, red: 100%, green: 0%, blue: 0% }

# Attention, puces ESP32 classique !
esp32:
  board: esp32dev
  framework:
    type: arduino
    advanced:
      minimum_chip_revision: "3.1"
      sram1_as_iram: true

logger:
  level: INFO

api:
  encryption:
    key: !secret crypto_key_passe_partout

ota:
  - platform: esphome

wifi:
  fast_connect: yes
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  on_connect:
    then:
      - lvgl.label.update:
          id: lbl_config_ip
          text: !lambda 'return std::string(esphome::network::get_use_address());'

# Configuration des bus SPI physiques du CYD
spi:
  - id: spi_display
    clk_pin: GPIO14
    mosi_pin: GPIO13
    miso_pin: GPIO12
  - id: spi_touch
    clk_pin: GPIO25
    mosi_pin: GPIO32
    miso_pin: GPIO39

# Gestion du rétroéclairage de l'écran (Dimming)
output:
  - platform: ledc
    pin: GPIO21
    id: backlight_pwm

  - platform: ledc
    pin: GPIO26
    id: buzzer_pwm

  # LED RGB Arrière - Configuration des pins physiques (avec inversion intégrée)
  - platform: ledc
    pin: GPIO4
    id: output_red
    inverted: true
  - platform: ledc
    pin: GPIO16
    id: output_green
    inverted: true
  - platform: ledc
    pin: GPIO17
    id: output_blue
    inverted: true

light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Rétroéclairage Écran"
    id: cyd_backlight
    restore_mode: ALWAYS_ON

  # LED RGB Arrière
  - platform: rgb
    name: "LED Alerte Arrière"
    id: led_alerte
    red: output_red
    green: output_green
    blue: output_blue

# Haut-parleur (Générateur de sons RTTTL/Nokia)
rtttl:
  output: buzzer_pwm
  id: mon_haut_parleur

# =================================
# CONFIGURATION DU COMPOSANT TEMPS
# =================================
time:
  - platform: homeassistant
    id: homeassistant_time
    timezone: America/Toronto
    # On ajoute la boucle de mise à jour à chaque seconde ici :
    on_time:
      - seconds: /1
        then:
          # Mise à jour de l'Heure Géante (HH:MM:SS)
          - lvgl.label.update:
              id: lbl_horloge_heure
              text:
                format: "%02d:%02d:%02d"
                args: [ 'id(homeassistant_time).now().hour', 'id(homeassistant_time).now().minute', 'id(homeassistant_time).now().second' ]
          - lvgl.label.update:
              id: lbl_menu_heure
              text:
                format: "%02d:%02d:%02d"
                args: [ 'id(homeassistant_time).now().hour', 'id(homeassistant_time).now().minute', 'id(homeassistant_time).now().second' ]

  - platform: homeassistant
    id: temps_interne
    on_time:
      - seconds: 0
        then:
          - if:
              condition:
                lambda: |-
                  auto t = id(temps_interne).now();
                  return (id(reveil_active) && t.hour == id(reveil_heure) && t.minute == id(reveil_minute));
              then:
                - light.turn_on: cyd_backlight
                - lambda: |-
                    id(reveil_en_train_de_sonner) = true;
                - script.execute: script_sonnerie_reveil
                - lvgl.widget.show: popup_alarme
                - light.turn_on:
                    id: led_alerte
                    red: 0%
                    green: 0%
                    blue: 100%

# Variables et Constantes
globals:
  - id: page_active
    type: int
    restore_value: no
    initial_value: '0'
  - id: val_bat_cuisine
    type: int
    initial_value: '0'
  - id: val_bat_pompe
    type: int
    initial_value: '0'
  - id: val_bat_placard
    type: int
    initial_value: '0'
  - id: val_bat_porte
    type: int
    initial_value: '0'
  - id: val_bat_esc_bas
    type: int
    initial_value: '0'
  - id: val_bat_esc_haut
    type: int
    initial_value: '0'
  # Ce verrou passe à 'true' quand on clique sur OK. Il bloque la sirène.
  - id: alerte_air_muette
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: alerte_cpu_muette
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: popup_actif
    type: bool
    initial_value: 'false'
  - id: chrono_running
    type: bool
    initial_value: 'false'
  - id: chrono_seconds
    type: int
    initial_value: '0'
  - id: timer_running
    type: bool
    initial_value: 'false'
  - id: timer_seconds
    type: int
    initial_value: '300' # 5 minutes par défaut
  - id: reveil_active
    type: bool
    initial_value: 'false'
  - id: reveil_heure
    type: int
    initial_value: '6'
  - id: reveil_minute
    type: int
    initial_value: '30'
  - id: reveil_en_train_de_sonner
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: chrono_millis_depart
    type: uint32_t
    initial_value: '0'
  - id: chrono_millis_total
    type: uint32_t
    initial_value: '0'
  - id: chrono_en_marche
    type: bool
    initial_value: 'false'
  - id: volume_distant
    type: float
    initial_value: '60.0'
  - id: blocage_initial
    type: bool
    initial_value: 'true'
  - id: couleur_del_pref
    type: int
    restore_value: yes
    initial_value: '1' # Bleu par défaut
  - id: son_actif
    type: bool
    restore_value: yes
    initial_value: 'true'

number:
  - platform: template
    name: "Sauvegarde Veille"
    id: sauvegarde_veille
    optimistic: yes
    restore_value: yes
    initial_value: 120
    min_value: 0
    max_value: 300
    step: 30

# BANQUE DE SONS (Scripts réutilisables partout)
script:
  # Bip simple discret (Changement de page)
  - id: bip_discret
    mode: single
    then:
      - if:
          condition:
            lambda: 'return !id(son_actif);'
          then:
            - script.stop: bip_discret
      - rtttl.play: "click:d=4,o=4,b=250:32c" # Clic Sourd et court (Octave 4, note de 32)
      # clic Pock mécanique (Octave 3, note Sol g): "click:d=4,o=3,b=250:32g"
      # Une seule note très rapide: "click:d=4,o=5,b=200:16c" 
      # Pour un Bip moyen: "bip:d=4,o=5,b=120:16p,16e6"

  # Double bip rapide (Confirmation d'action)
  - id: double_bip
    mode: restart
    then:
      - rtttl.play: "double:d=4,o=5,b=150:16e6,16p,16e6"

  # Sirène alternée (Alerte critique : Fuite ou Température)
  - id: sirene_alerte
    mode: restart
    then:
      - rtttl.play: "alerte:d=4,o=5,b=180:8e6,8c6,8e6,8c6,8e6,8c6"

  # Sirène en boucle (Alerte critique : Fuite ou Température)
  - id: sirene_boucle
    mode: restart
    then:
      - while:
          condition:
            lambda: 'return id(popup_actif);'
          then:
            - light.turn_on:
                id: led_alerte
                red: 100%
                green: 0%
                blue: 0%
            - rtttl.play: "sirène:d=4,o=5,b=150:8c,8d,8c,8d"
            - delay: 3s
            - light.turn_off:
                id: led_alerte
            - delay: 0.5s

  # Sonnerie pour le Réveil-Matin - Sonne en Boucle
  - id: script_sonnerie_reveil
    mode: restart
    then:
      - while:
          condition:
            - lambda: 'return id(reveil_en_train_de_sonner);'
          then:
            - light.turn_on:
                id: led_alerte
                red: 0%
                green: 0%
                blue: 100%
            - rtttl.play: "bip:d=4,o=4,b=250:32c"
            - delay: 150ms
            - rtttl.play: "bip:d=4,o=4,b=250:32c"
            - delay: 150ms
            - rtttl.play: "bip:d=4,o=4,b=250:32c"
            - delay: 150ms
            - rtttl.play: "bip:d=4,o=4,b=250:32c"
            - delay: 1s  # Pause d'une seconde entre les séries de bips
            - light.turn_off:
                id: led_alerte
            - delay: 0.5s

  # Mise en veile de l'écran
  - id: gestion_veille
    mode: restart
    then:
      - if:
          condition:
            # On lit DIRECTEMENT le composant number (.state) au lieu de la globale
            lambda: 'return id(sauvegarde_veille).state == 0;'
          then:
            - light.turn_on: cyd_backlight # On s'assure qu'il reste allumé
            - script.stop: gestion_veille  # On arrête le script ici !
      
      # Si on n'est pas à 0, on applique le délai choisi dans le menu (+ ou -)
      - delay: !lambda 'return id(sauvegarde_veille).state * 1000;'
      - light.turn_off: cyd_backlight

