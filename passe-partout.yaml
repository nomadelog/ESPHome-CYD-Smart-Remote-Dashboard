# Écran branché sur son bus dédié
display:
  - platform: ili9xxx
    spi_id: spi_display
    model: ILI9341
    invert_colors: false
    cs_pin: GPIO15
    dc_pin: GPIO2
    id: cyd_display

# Tactile branché sur son bus dédié
touchscreen:
  - platform: xpt2046
    spi_id: spi_touch
    cs_pin: GPIO33
    interrupt_pin: GPIO36
    update_interval: 50ms
    threshold: 400
    id: cyd_touch
    calibration:
      x_min: 290
      x_max: 3880
      y_min: 340
      y_max: 3840
    transform:
      swap_xy: false
      mirror_x: true
      mirror_y: false
    on_touch:
      then:
        - if:
            condition:
              light.is_off: cyd_backlight
            then:
              - light.turn_on: cyd_backlight
              - script.execute: gestion_veille
            else:
              - script.execute: gestion_veille

button:
  - platform: restart
    name: "Redémarrer le Passe-Partout"
    id: reboot_du_cyd

# =========================================================
# TOUS TES CAPTEURS NUMÉRIQUES (Mélange Interne CYD et HA)
# =========================================================
sensor:
  - platform: wifi_signal
    id: mon_wifi_signal
    name: "Signal Wi-Fi"
    update_interval: 60s
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_wifi_bas
            text:
              format: "Wi-Fi: %.0f dBm"
              args: [ 'x' ]

  # Photorésistance INTERNE (onboard) du CYD
  - platform: adc
    pin: GPIO34
    id: cyd_ldr
    name: "Lumière Ambiante CYD"
    update_interval: 2s # Un peu plus rapide (2s) pour capter la lampe de poche sans attendre
    attenuation: 12db
    filters:
      # 1. On lisse les lectures pour éliminer le bruit (fini le flicker !)
      - sliding_window_moving_average:
          window_size: 5
          send_every: 1
          
      # 2. Calibrage propre (du plus petit au plus grand en entrée)
      # Plus la tension baisse (proche de 0), plus il y a de lumière.
      # Plus la tension monte (proche de 3), plus il fait noir.
      - calibrate_linear:
          - 0.2 -> 1.0  # Forte lumière (basse tension brute) = Écran à 100%
          - 3.0 -> 0.1  # Noirceur (haute tension brute) = Écran à 10%
          
      # 3. Sécurité : On force la valeur à RESTER entre 10% et 100% quoi qu'il arrive
      - clamp:
          min_value: 0.1
          max_value: 1.0
          
    on_value:
      then:
        - light.control:
            id: cyd_backlight
            brightness: !lambda "return x;"

  # --- À partir d'ici, on fusionne tes capteurs Home Assistant ---
  
  # --- SOUS-PAGE : CLIMAT ---
  - platform: homeassistant
    id: temp_salon
    entity_id: sensor.smart_air_salon_temperature
    internal: true
    on_value:
      - lvgl.label.update:
          id: lbl_salon_stats
          text:
            format: "%.1f°C / %.0f%%"
            args: [ 'id(temp_salon).state', 'id(hum_salon).state' ]

  - platform: homeassistant
    id: hum_salon
    entity_id: sensor.smart_air_salon_humidity
    internal: true
    on_value:
      - lvgl.label.update:
          id: lbl_salon_stats
          text:
            format: "%.1f°C / %.0f%%"
            args: [ 'id(temp_salon).state', 'id(hum_salon).state' ]

  - platform: homeassistant
    id: temp_verriere
    entity_id: sensor.pico_verriere_temperature_verriere
    internal: true
    on_value:
      - lvgl.label.update:
          id: lbl_verriere_stats
          text:
            format: "%.1f°C / %.0f%%"
            args: [ 'id(temp_verriere).state', 'id(hum_verriere).state' ]

  - platform: homeassistant
    id: hum_verriere
    entity_id: sensor.pico_verriere_humidite_verriere
    internal: true
    on_value:
      - lvgl.label.update:
          id: lbl_verriere_stats
          text:
            format: "%.1f°C / %.0f%%"
            args: [ 'id(temp_verriere).state', 'id(hum_verriere).state' ]

  - platform: homeassistant
    id: temp_prevost
    entity_id: sensor.prevost_temperature
    internal: true
    on_value:
      - lvgl.label.update:
          id: lbl_prevost_stats
          text:
            format: "%.1f°C / %.0f%%"
            args: [ 'id(temp_prevost).state', 'id(hum_prevost).state' ]

  - platform: homeassistant
    id: hum_prevost
    entity_id: sensor.prevost_humidite
    internal: true
    on_value:
      - lvgl.label.update:
          id: lbl_prevost_stats
          text:
            format: "%.1f°C / %.0f%%"
            args: [ 'id(temp_prevost).state', 'id(hum_prevost).state' ]

  - platform: homeassistant
    id: temp_sous_sol
    entity_id: sensor.thermo_hygrometre_sous_sol_temperature
    internal: true
    on_value:
      - lvgl.label.update:
          id: lbl_sous_sol_stats
          text:
            format: "%.1f°C / %.0f%%"
            args: [ 'id(temp_sous_sol).state', 'id(hum_sous_sol).state' ]

  - platform: homeassistant
    id: hum_sous_sol
    entity_id: sensor.thermo_hygrometre_sous_sol_humidity
    internal: true
    on_value:
      - lvgl.label.update:
          id: lbl_sous_sol_stats
          text:
            format: "%.1f°C / %.0f%%"
            args: [ 'id(temp_sous_sol).state', 'id(hum_sous_sol).state' ]

  - platform: homeassistant
    id: temp_garage
    entity_id: sensor.smart_air_garage_temperature
    internal: true
    on_value:
      - lvgl.label.update:
          id: lbl_garage_stats
          text:
            format: "%.1f°C / %.0f%%"
            args: [ 'id(temp_garage).state', 'id(hum_garage).state' ]

  - platform: homeassistant
    id: hum_garage
    entity_id: sensor.smart_air_garage_humidity
    internal: true
    on_value:
      - lvgl.label.update:
          id: lbl_garage_stats
          text:
            format: "%.1f°C / %.0f%%"
            args: [ 'id(temp_garage).state', 'id(hum_garage).state' ]

  # --- SOUS-PAGE : BATTERIES ---
  - platform: homeassistant
    id: bat_cuisine
    entity_id: sensor.detecteur_fuite_cuisine_battery
    internal: true
    on_value:
      - globals.set:
          id: val_bat_cuisine
          value: !lambda "return (int)x;"
      - lvgl.label.update:
          id: lbl_pct_cuisine
          text:
            format: "%.0f%%"
            args: [ 'x' ]

  - platform: homeassistant
    id: bat_pompe
    entity_id: sensor.detecteur_fuite_pompe_battery
    internal: true
    on_value:
      - globals.set:
          id: val_bat_pompe
          value: !lambda "return (int)x;"
      - lvgl.label.update:
          id: lbl_pct_pompe
          text:
            format: "%.0f%%"
            args: [ 'x' ]

  - platform: homeassistant
    id: bat_placard
    entity_id: sensor.detecteur_placard_entree_battery
    internal: true
    on_value:
      - globals.set:
          id: val_bat_placard
          value: !lambda "return (int)x;"
      - lvgl.label.update:
          id: lbl_pct_placard
          text:
            format: "%.0f%%"
            args: [ 'x' ]

  - platform: homeassistant
    id: bat_porte
    entity_id: sensor.detecteur_porte_entree_battery
    internal: true
    on_value:
      - globals.set:
          id: val_bat_porte
          value: !lambda "return (int)x;"
      - lvgl.label.update:
          id: lbl_pct_porte
          text:
            format: "%.0f%%"
            args: [ 'x' ]

  - platform: homeassistant
    id: bat_esc_bas
    entity_id: sensor.detecteur_escalier_bas_battery
    internal: true
    on_value:
      - globals.set:
          id: val_bat_esc_bas
          value: !lambda "return (int)x;"
      - lvgl.label.update:
          id: lbl_pct_esc_bas
          text:
            format: "%.0f%%"
            args: [ 'x' ]

  - platform: homeassistant
    id: bat_esc_haut
    entity_id: sensor.detecteur_escalier_haut_battery
    internal: true
    on_value:
      - globals.set:
          id: val_bat_esc_haut
          value: !lambda "return (int)x;"
      - lvgl.label.update:
          id: lbl_pct_esc_haut
          text:
            format: "%.0f%%"
            args: [ 'x' ]

  # --- SOUS-PAGE : MACHINE (System Monitor) ---
  - platform: homeassistant
    id: val_cpu
    entity_id: sensor.system_monitor_utilisation_du_processeur
    internal: true

  - platform: homeassistant
    id: val_ram
    entity_id: sensor.system_monitor_utilisation_de_la_memoire
    internal: true

  - platform: homeassistant
    id: val_temp
    entity_id: sensor.system_monitor_temperature_du_processeur
    internal: true
    on_value:
      - if:
          condition:
            lambda: 'return (id(val_temp).state > 60.0 && !id(alerte_cpu_muette));'
          then:
            - light.turn_on: cyd_backlight
            # On change le texte pour le CPU !
            - lvgl.label.update:
                id: popup_texte
                text: "Surchauffe : Le CPU dépasse 60°C !"
            - lvgl.widget.show: popup_alerte
            - light.turn_on:
