                bg_color: 0xE74C3C
                radius: 5
                widgets:
                  - label:
                      text: "ARRÊTER"
                      text_font: font_normal
                      align: LV_ALIGN_CENTER
                on_click:
                  - light.turn_on:
                      id: led_alerte
                      red: 0%
                      green: 0%
                      blue: 100%
                  - script.execute: bip_discret
                  - lambda: |-
                      id(reveil_en_train_de_sonner) = false;
                  - script.execute: gestion_veille
                  - lvgl.widget.hide: popup_alarme

