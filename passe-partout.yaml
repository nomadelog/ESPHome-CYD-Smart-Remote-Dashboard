# Contrôle du Temps
interval:
  - interval: 1s
    then:
      # Mise à jour des textes de la page MACHINE
      - lvgl.label.update:
          id: lbl_txt_cpu
          text: !lambda |-
            char buf[16];
            snprintf(buf, sizeof(buf), "%.0f%%", id(val_cpu).state);
            return std::string(buf);

      - lvgl.label.update:
          id: lbl_txt_ram
          text: !lambda |-
            char buf[16];
            snprintf(buf, sizeof(buf), "%.0f%%", id(val_ram).state);
            return std::string(buf);

      - lvgl.label.update:
          id: lbl_txt_disque
          text: !lambda |-
            char buf[16];
            snprintf(buf, sizeof(buf), "%.0f%%", id(val_disque).state);
            return std::string(buf);

      - lvgl.label.update:
          id: lbl_txt_temp
          text: !lambda |-
            char buf[16];
            snprintf(buf, sizeof(buf), "%.1f°C", id(val_temp).state);
            return std::string(buf);

      # Moteur du Timer (Compte à rebours)
      - lambda: |-
          // On ne décrémente QUE si le timer est démarré ET supérieur à zéro
          if (id(timer_running) && id(timer_seconds) > 0) {
            id(timer_seconds)--;
          }
      - lvgl.label.update:
          id: lbl_timer_temps
          text: !lambda |-
            int mins = id(timer_seconds) / 60;
            int secs = id(timer_seconds) % 60;
            char buf[16];
            snprintf(buf, sizeof(buf), "%02d:%02d", mins, secs);
            return std::string(buf);
            
      # Action instantanée lorsque la minuterie vient de se terminer
      - if:
          condition:
            lambda: 'return id(timer_seconds) == 0 && id(timer_running);'
          then:
            - light.turn_on: cyd_backlight
            - lambda: |-
                id(timer_running) = false;            // On arrête le moteur
                id(reveil_en_train_de_sonner) = true; // On lève le drapeau de la sonnerie
            - script.execute: script_sonnerie_reveil   # On lance le bip-bip-bip en boucle
            - lvgl.widget.show: popup_alarme          # On fait surgir le popup au premier plan !
            - light.turn_on:
                id: led_alerte
                red: 0%
                green: 0%
                blue: 100%

  - interval: 10s
    startup_delay: 0s
    then:
      - homeassistant.service:
          service: homeassistant.update_entity
          data:
            entity_id: media_player.salle_de_sejour_2
      - delay: 500ms
      - lvgl.widget.redraw:
          id: volume_slider

  - interval: 50ms
    then:
      - if:
          condition:
            lambda: 'return id(chrono_running);'
          then:
            - lvgl.label.update:
                id: lbl_chrono_temps
                text: !lambda |-
                  // On calcule le temps précis écoulé depuis le départ
                  uint32_t actuel = millis() - id(chrono_millis_depart);
                  uint32_t total_centi = actuel / 10; // Convertit les ms en centièmes
                  
                  int mins = total_centi / 6000;
                  int secs = (total_centi % 6000) / 100;
                  int centi = total_centi % 100;
                  
                  char buf[32];
                  snprintf(buf, sizeof(buf), "%02d:%02d:%02d", mins, secs, centi);
                  return std::string(buf);

# MOTEUR GRAPHIQUE : Version Dashboard à 4 gros boutons
lvgl:
  displays:
    - cyd_display
  touchscreens:
    - cyd_touch
  
  rotation: 90
  theme:
    dark_mode: true

  # Top_layer permet au popup de s'afficher PAR-DESSUS n'importe quelle page !
  top_layer:
    widgets:
      - obj:
          id: popup_alerte
          x: 20
          y: 40
          width: 280
          height: 160
          hidden: true
          bg_color: 0x1A1A1A
          border_width: 2
          border_color: 0xFF0000
          radius: 8
          # --- LES DEUX LIGNES MAGIQUES ANTI-SCROLL ---
          scrollbar_mode: LV_SCROLLBAR_MODE_OFF
          scrollable: false
          widgets:
            - label:
                id: popup_texte
                text: "Une anomalie a été détectée."
                x: 10
                y: 15
                width: 260
                text_font: font_normal
                align: LV_ALIGN_TOP_MID
                text_align: LV_TEXT_ALIGN_CENTER

            - button:
                id: popup_bouton_ok
                x: 0
                y: -15             # Changé en négatif pour le remonter proprement du bas
                width: 100
                height: 40
                align: LV_ALIGN_BOTTOM_MID
                bg_color: 16711680
                radius: 5
                widgets:
                  - label:
                      text: "OK"
                      text_font: font_normal
                      align: LV_ALIGN_CENTER
                on_click:
                  - light.turn_on:
                      id: led_alerte
                      red: 0%
                      green: 0%
                      blue: 100%
                  - globals.set: { id: popup_actif, value: 'false' }
                  - lambda: "id(mon_haut_parleur).stop();"
                  - script.execute: gestion_veille
                  - lvgl.widget.hide: popup_alerte

      - obj:
          id: popup_alarme
          x: 20
          y: 40
          width: 280
          height: 160
          hidden: true
          bg_color: 0x1A1A1A
          border_width: 2
          border_color: 0xE74C3C
