- sensor:
    - name: "Passe-Partout Volume JBL"
      unique_id: passe_partout_volume_jbl
      state: "{{ state_attr('media_player.salle_de_sejour_2', 'volume_level') | float(0) * 100 }}"
      unit_of_measurement: "%"

    - name: "Date Longue CYD"
      unique_id: date_longue_cyd
      state: >
        {% set jours = ["Dimanche", "Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi", "Samedi"] %}
        {% set mois = ["janvier", "février", "mars", "avril", "mai", "juin", "juillet", "août", "septembre", "octobre", "novembre", "décembre"] %}
        {{ jours[now().strftime('%w') | int] }} {{ now().day }} {{ mois[now().month - 1] }} {{ now().year }}

    - name: "Passe Partout - Titre Actuel"
      state: >
        {{ state_attr('media_player.salle_de_sejour_2', 'media_title') | default('Aucune musique', true) }}
      icon: mdi:music-note

    - name: "Passe Partout - Artiste Actuel"
      state: >
        {{ state_attr('media_player.salle_de_sejour_2', 'media_artist') | default('Inconnu', true) }}
      icon: mdi:account-music

    - name: "Passe Partout - Statut Lecture"
      state: >
        {{ states('media_player.salle_de_sejour_2') }}

- trigger:
    - platform: time_pattern
      minutes: "/15"
    - platform: homeassistant
      event: start
  action:
    - action: calendar.get_events
      target:
        entity_id: calendar.entre_buttes
      data:
        start_date_time: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
        end_date_time: "{{ (now() + timedelta(days=60)).strftime('%Y-%m-%d %H:%M:%S') }}"
      response_variable: agenda
  sensor:
    - name: "Agenda CYD Formate"
      unique_id: agenda_cyd_formate
      state: >
        {% set mois_fr = {
          'Jan': 'janvier', 'Feb': 'février', 'Mar': 'mars', 'Apr': 'avril', 
          'May': 'mai', 'Jun': 'juin', 'Jul': 'juillet', 'Aug': 'août', 
          'Sep': 'septembre', 'Oct': 'octobre', 'Nov': 'novembre', 'Dec': 'décembre',
          'January': 'janvier', 'February': 'février', 'March': 'mars', 'April': 'avril',
          'June': 'juin', 'July': 'juillet', 'August': 'août', 'September': 'septembre',
          'October': 'octobre', 'November': 'novembre', 'December': 'décembre'
        } %}
        
        {% set ns = namespace(events=[]) %}
        {% if agenda['calendar.entre_buttes'] is defined and agenda['calendar.entre_buttes'].events | length > 0 %}
          {% set ns.events = agenda['calendar.entre_buttes'].events %}
        {% elif agenda.events is defined and agenda.events | length > 0 %}
          {% set ns.events = agenda.events %}
        {% endif %}

        {% if ns.events | length > 0 %}
          {%- for ev in ns.events -%}
            {%- set jour = ev.start | as_timestamp | timestamp_custom('%e') | trim -%}
            {%- set mois_en = ev.start | as_timestamp | timestamp_custom('%B') -%}
            {%- set mois = mois_fr[mois_en] if mois_en in mois_fr else mois_en -%}
            {{ jour }} {{ mois }} --> {{ ev.summary }}{{ '\n' if not loop.last }}
          {%- endfor -%}
        {% else %}
          Aucun événement à venir
        {% endif %}
